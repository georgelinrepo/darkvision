AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DarkVision — Move Normaliser Proxy

# Before deploying, store the key once:
#   aws ssm put-parameter \
#     --name /darkvision/anthropic-key \
#     --value sk-ant-... \
#     --type SecureString
#
# The key is encrypted at rest, fetched at Lambda cold start,
# and never visible in CloudFormation or the Lambda console.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128

Resources:
  NormaliserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: .
      Environment:
        Variables:
          SSM_PARAM_NAME: /darkvision/anthropic-key
      Policies:
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/darkvision/anthropic-key'
            - Effect: Allow
              Action: kms:Decrypt
              Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm'
      Events:
        NormaliseMove:
          Type: HttpApi
          Properties:
            Path: /normalise-move
            Method: ANY

Outputs:
  NormaliserUrl:
    Description: Proxy endpoint — set as EXPO_PUBLIC_NORMALISER_URL in app/.env
    Value: !Sub 'https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/normalise-move'
