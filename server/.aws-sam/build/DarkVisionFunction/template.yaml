AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: DarkVision — API (move normaliser + rating store)

# Before deploying, store the Anthropic key once:
#   aws ssm put-parameter \
#     --name /darkvision/anthropic-key \
#     --value sk-ant-... \
#     --type SecureString

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128

Resources:

  # S3 bucket for player ratings (one JSON file per user)
  RatingsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'darkvision-ratings-${AWS::AccountId}'

  DarkVisionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: .
      Environment:
        Variables:
          SSM_PARAM_NAME: /darkvision/anthropic-key
          RATINGS_BUCKET: !Ref RatingsBucket
      Policies:
        # SSM — read Anthropic key
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/darkvision/anthropic-key'
            - Effect: Allow
              Action: kms:Decrypt
              Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm'
        # S3 — read and write ratings
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: !Sub '${RatingsBucket.Arn}/ratings/*'
      Events:
        GetRating:
          Type: HttpApi
          Properties:
            Path: /rating
            Method: GET
        PostRating:
          Type: HttpApi
          Properties:
            Path: /rating
            Method: POST
        NormaliseMove:
          Type: HttpApi
          Properties:
            Path: /normalise-move
            Method: ANY

Outputs:
  ApiUrl:
    Description: Base API URL — set as EXPO_PUBLIC_API_URL in app/.env
    Value: !Sub 'https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
